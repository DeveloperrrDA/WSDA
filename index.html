<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasaaradda Diinta & Awqaafta</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:#fff;
    width:100%;
    max-width:420px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:35px 25px;
}

.header img{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    padding:8px;
    margin-bottom:15px;
}

.header h1{
    font-size:24px;
    margin-bottom:8px;
}

.header p{
    opacity:.9;
    font-size:15px;
}

.content{
    padding:25px;
}

.item{
    margin-bottom:20px;
}

.label{
    font-size:13px;
    color:#777;
    margin-bottom:5px;
}

.value{
    font-size:16px;
    color:#222;
    font-weight:600;
}

.button{
    display:block;
    text-decoration:none;
    text-align:center;
    background:#0b6e4f;
    color:white;
    padding:15px;
    border-radius:10px;
    margin-top:25px;
    font-weight:bold;
    transition:.3s;
}

.button:hover{
    background:#09543d;
}

.footer{
    text-align:center;
    color:#777;
    font-size:13px;
    padding:20px;
}
</style>

</head>

<body>

<div class="card">

<div class="header">

<img src="logo.jpg" alt="Logo">

<h1>Wasaaradda Diinta & Awqaafta</h1>

<p>Jamhuuriyadda Somaliland</p>

</div>

<div class="content">

<div class="item">
<div class="label">Address</div>
<div class="value">
Sha'aab Road No. 1<br>
Hargeisa, Somaliland
</div>
</div>

<div class="item">
<div class="label">Official Website</div>
<div class="value">
mora.govsomaliland.org
</div>
</div>

<a class="button"
href="https://mora.govsomaliland.org"
target="_blank">
Visit Official Website
</a>

</div>

<div class="footer">
© absprintingfirm.com
</div>

</div>

</body>
</html>
